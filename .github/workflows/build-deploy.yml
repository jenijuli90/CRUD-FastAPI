# ------------------------------------------------
# FLOW:
# push code to GitHub
#        ↓
#   build-test job
#        ↓
#   ┌────────────────────────┐
#   │ 1. checkout code       │
#   │ 2. setup python        │
#   │ 3. install deps        │
#   │ 4. run pytest          │  ← if tests fail, stops here
#   │ 5. login to docker hub │
#   │ 6. build & push image  │
#   │ 7. show digest         │
#   └────────────────────────┘
#        ↓ (only if all steps pass)
#    deploy job
#        ↓
#   ┌────────────────────────┐
#   │ 1. wait 20 seconds     │  ← let Docker Hub propagate
#   │ 2. PATCH → update img  │  ← tell Render which image
#   │ 3. POST → trigger deploy│ ← tell Render to deploy it
#   └────────────────────────┘
#        ↓
#   Render pulls image from Docker Hub
#        ↓
#   App is live!
# ------------------------------------------------

name: Build and Deploy code
# Trigger the workflow on every push/pull_request
on: [push,pull_request] 

jobs: 
  build-test:
    environment:
      name: testing
    env:
      DATABASE_HOSTNAME: ${{secrets.DATABASE_HOSTNAME}}
      DATABASE_PORT: ${{secrets.DATABASE_PORT}}
      DATABASE_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
      DATABASE_NAME: ${{secrets.DATABASE_NAME}}
      DATABASE_USERNAME: ${{secrets.DATABASE_USERNAME}}
      SECRET_KEY: ${{secrets.SECRET_KEY}}
      ALGORITHM: ${{secrets.ALGORITHM}}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{secrets.ACCESS_TOKEN_EXPIRE_MINUTES}}

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
          POSTGRES_DB: ${{secrets.DATABASE_NAME}}_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    runs-on: ubuntu-latest
    steps:
      # Step 1: checkoutrepository
      - name: checkout code
        uses: actions/checkout@v3
      
      # Step 2: Install Python dependencies
      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: update pip
        run: python -m pip install --upgrade pip
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # Step 3: Run tests,| to run multiple install
      - name: Run tests
        run: |
          pip install pytest
          pytest

      # Step 4: Log into Docker Hub
      - name: Login to docker hub
        uses: docker/login-action@v1
        with:
          username: ${{secrets.DOCKER_HUB_USERNAME}}
          password: ${{secrets.DOCKER_HUB_ACCESS_TOKEN}}

      # Set up Docker
      #docker buildx enables multi-platform builds.
      #Normal docker build cannot do this — it only builds for the runner’s architecture.Buildx also supports caching and efficient image layers for multi-platform builds.
      - name: Set up Docker build
        id: buildx
        uses: docker/setup-buildx-action@v2

      # Build and push docker image
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./             # Build context (where Dockerfile and app files are)
          file: ./Dockerfile      # Path to Dockerfile
          builder: ${{ steps.buildx.outputs.name }}  # Specifies the Buildx builder to use
          push: true              # Push image to registry (Docker Hub)
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi:${{ github.sha }}  
          cache-from: type=local,src=/tmp/.buildx-cache  # Use cache from previous builds
          cache-to: type=local,dest=/tmp/.buildx-cache    # Save build cache for next run

      #Show Docker image digest
      - name: Show Image digest
        run: echo ${{ steps.docker_build.outputs.digest }} #returns the SHA256 digest of the pushed image.

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Deploy new image to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          IMAGE_SHA: ${{ github.sha }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        run: |
          echo "Waiting for Docker Hub to propagate the image..."
          sleep 30

          echo "=== IMAGE BEING DEPLOYED ==="
          echo "$DOCKER_USERNAME/fastapi:$IMAGE_SHA"

          echo "=== STEP 1: UPDATING IMAGE CONFIG ==="
          PATCH_RESPONSE=$(curl -s -X PATCH \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"dockerImage":"'"$DOCKER_USERNAME"'/fastapi:'"$IMAGE_SHA"'"}' \
            https://api.render.com/v1/services/srv-d6j3sqhaae7s739ce4ug)
          echo "PATCH Response: $PATCH_RESPONSE"    # ← shows what Render replied

          echo "Waiting for config to save..."
          sleep 10                                   # ← give Render time to save config

          echo "=== STEP 2: TRIGGERING DEPLOY ==="
          DEPLOY_RESPONSE=$(curl -s -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/srv-d6j3sqhaae7s739ce4ug/deploys)
          echo "DEPLOY Response: $DEPLOY_RESPONSE"  # ← shows what Render replied

          echo "=== DONE ==="


